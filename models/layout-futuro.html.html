<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo 3D - To-Be (Layout Final com Fluxo Otimizado)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info { position: absolute; top: 15px; width: 100%; text-align: center; pointer-events: none; color: #2d3748; }
        #info h3 { margin: 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px;}
        #info p { margin: 5px 0 0 0; font-size: 0.9rem; color: #4a5568;}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="info">
        <h3>Planta 3D: Estado Futuro (To-Be)</h3>
        <p>Prateleira amarela ancorada em 90° com a roxa e corredor central aberto</p>
    </div>
    
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xe2e8f0);
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(10, 25, 18); 
        controls.target.set(7.5, 0, 7);  
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);

        const gridHelper = new THREE.GridHelper(20, 20, 0xa0aec0, 0xcbd5e0);
        gridHelper.position.set(7.5, -0.01, 5);
        scene.add(gridHelper);

        function construirVolume(x, z, largX, profZ, altura, corHex, opacidade = 1.0, baseY = 0) {
            const geometry = new THREE.BoxGeometry(largX, altura, profZ);
            const material = new THREE.MeshLambertMaterial({ 
                color: corHex, 
                transparent: opacidade < 1.0, 
                opacity: opacidade 
            });
            const bloco = new THREE.Mesh(geometry, material);
            bloco.position.set(x + largX/2, baseY + altura/2, z + profZ/2);
            
            const edges = new THREE.EdgesGeometry(geometry);
            const linhas = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x1a202c, linewidth: 1 }));
            linhas.position.copy(bloco.position);
            
            scene.add(bloco);
            scene.add(linhas);
        }

        // --- 1. ESTRUTURA DO PRÉDIO ---
        construirVolume(0, 5, 14.5, 7.0, 3.0, 0x4299e1, 0.05); // Vendas 
        construirVolume(14.5, 0, 1.5, 12.0, 3.0, 0x48bb78, 0.3); // Corredor
        construirVolume(9.5, 0, 4, 2, 3.0, 0xd2b48c, 0.6); // Banheiro
        
        // --- A LINHA DE FRIO ---
        construirVolume(0, 3.0, 4.5, 3.5, 2.8, 0xed8936); // Camara fria
        construirVolume(4.5, 5.0, 7.0, 1.5, 2.2, 0xb83280); // Refrigerador rosa

        // --- 2. O NOVO ESTOQUE ORGANIZADO (EM L) ---
        construirVolume(0.5, 0.2, 4.0, 0.8, 2.5, 0x4a5568); // Prateleira 1 (Parede do Fundo)
        construirVolume(0.5, 1.0, 0.8, 3.0, 2.5, 0x4a5568); // Prateleira 2 (Parede Lateral Esquerda)

        // --- 3. CONTROLE DE PRAGAS (5 RATOEIRAS) ---
        construirVolume(0.2, 0.2, 0.2, 0.3, 0.1, 0x1a202c); 
        construirVolume(9.0, 1.8, 0.2, 0.3, 0.1, 0x1a202c); 
        construirVolume(4.6, 6.6, 0.3, 0.2, 0.1, 0x1a202c); 
        construirVolume(13.0, 4.8, 0.2, 0.3, 0.1, 0x1a202c); 
        construirVolume(1.5, 11.6, 0.3, 0.2, 0.1, 0x1a202c); 

        // --- 4. PAREDE DIREITA ---
        construirVolume(13.5, 5.0, 1.0, 1.35, 2.55, 0x90cdf4); // Freezer Gelo
        construirVolume(13.5, 6.35, 1.0, 2.0, 2.0, 0xe53e3e); // Freezer Carnes
        construirVolume(13.5, 8.35, 1.0, 3.15, 2.0, 0x805ad5); // Prateleira Roxa

        // --- 5. A NOVA FRENTE DE LOJA OTIMIZADA ---
        construirVolume(0, 9.0, 4.0, 1.0, 1.1, 0xa0aec0); // Caixa recuado (Cinza)
        
        // O "L" invertido para trás alinhado à direita do Caixa
        construirVolume(3.2, 7.0, 0.8, 2.0, 1.5, 0xed8936); 

        // CORREÇÃO FINAL: Prateleira amarela fina encostada na roxa (formando 90 graus)
        // Deslocada de X=4.0 para X=6.0, encostando exatamente em X=13.5 (início da roxa)
        construirVolume(6.0, 11.05, 7.5, 0.4, 1.5, 0xf6e05e); 

        // Balcões Vazados (Apoiados na amarela)
        construirVolume(8.5, 9.05, 0.8, 2.0, 1.5, 0xed8936); 
        construirVolume(10.5, 9.05, 0.8, 2.0, 1.5, 0xed8936); 

        // --- 6. MOBILIÁRIO ESQUERDO E PRATELEIRAS ---
        construirVolume(0, 10.95, 1.0, 1.2, 1.0, 0x68d391); // Freezer verde-agua
        construirVolume(0.45, 6.95, 1.0, 1.5, 1.0, 0x68d391); // Freezer interno
        
        // Prateleiras Suspensas
        construirVolume(0, 6.55, 0.35, 5.2, 1.25, 0x4fd1c5, 0.18, 1.2); 
        construirVolume(0, 6.55, 0.5, 5.2, 0.08, 0x4fd1c5, 1.0, 1.2);
        construirVolume(0, 6.55, 0.5, 5.2, 0.08, 0x4fd1c5, 1.0, 1.6);
        construirVolume(0, 6.55, 0.5, 5.2, 0.08, 0x4fd1c5, 1.0, 2.0);
        construirVolume(0, 6.55, 0.5, 5.2, 0.08, 0x4fd1c5, 1.0, 2.4);
        construirVolume(0, 6.55, 0.5, 0.07, 1.25, 0x4fd1c5, 1.0, 1.2);
        construirVolume(0, 8.25, 0.5, 0.07, 1.25, 0x4fd1c5, 1.0, 1.2);
        construirVolume(0, 9.95, 0.5, 0.07, 1.25, 0x4fd1c5, 1.0, 1.2);
        construirVolume(0, 11.68, 0.5, 0.07, 1.25, 0x4fd1c5, 1.0, 1.2);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
